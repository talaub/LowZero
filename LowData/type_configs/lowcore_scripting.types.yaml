module: LowCore
namespace:
  - Low
  - Core
  - Scripting
dll_macro: LOW_CORE_API
prefix: LowCoreScript
types:
  Module:
    no_auto_serialize: true
    no_auto_deserialize: true
    no_auto_duplicate: true
    scripting_expose: true
    properties:
      scripts:
        type: Low::Util::List<uint64_t>
        no_setter: true
      as_module:
        type: char*
      classes:
        type: Low::Util::List<uint64_t>
        no_setter: true
      reload_index:
        type: uint32_t
      ticking_functions:
        type: Low::Util::List<char*>
        no_setter: true
    functions:
      find_class_by_name:
        return_type: uint64_t
        parameters:
          - name: name
            type: Low::Util::Name
  Asset:
    no_auto_serialize: true
    no_auto_deserialize: true
    no_auto_duplicate: true
    scripting_expose: true
    unique_id: true
    properties:
      module:
        type: Low::Core::Scripting::Module
        handle: true
      source_path:
        type: Low::Util::String
        private_setter: true
    functions:
      get_full_path:
        return_type: Low::Util::String
        constant: true
        const: true
  Class:
    no_auto_serialize: true
    no_auto_deserialize: true
    no_auto_duplicate: true
    properties:
      module:
        type: Low::Core::Scripting::Module
        handle: true
      as_class:
        type: char*
        getter_name: as_class
      reload_index:
        type: uint32_t
    functions:
      needs_refresh:
        return_type: bool
      is_valid:
        return_type: bool
      spawn_instance:
        return_type: Low::Core::Scripting::ClassInstance
        return_handle: true
        parameters:
          - name: name
            type: Low::Util::Name
  ClassInstance:
    no_auto_serialize: true
    no_auto_deserialize: true
    no_auto_duplicate: true
    private_make: true
    properties:
      script_class:
        type: uint64_t
      reload_index:
        type: uint32_t
      ptr:
        type: char*
        getter_name: _ptr
        private_getter: true
    functions:
      needs_refresh:
        return_type: bool
      get_ptr:
        return_type: char*
      spawn:
        private: true
        return_type: char*
      make:
        static: true
        return_type: Low::Core::Scripting::ClassInstance
        return_handle: true
        parameters:
          - name: name
            type: Low::Util::Name
          - name: scriptClass
            type: Low::Core::Scripting::Class
            handle: true
