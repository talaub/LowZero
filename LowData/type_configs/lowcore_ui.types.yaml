module: LowCore
namespace:
  - Low
  - Core
  - UI
dll_macro: LOW_CORE_API
prefix: LowCoreUi
types:
  Controller:
    no_auto_serialize: true
    no_auto_deserialize: true
    no_auto_duplicate: true
    private_make: true
    properties:
      value:
        type: ControllerValue
      type:
        type: ControllerType
        private_setter: true
        no_ref: true
    functions:
      make_code:
        static: true
        return_type: Low::Core::UI::Controller
        return_handle: true
        parameters:
          - name: name
            type: Low::Util::Name
      make_script:
        static: true
        return_type: Low::Core::UI::Controller
        return_handle: true
        parameters:
          - name: name
            type: Low::Util::Name
          - name: class
            type: Low::Core::Scripting::Class
            handle: true
      spawn_instance:
        return_type: Low::Core::UI::ControllerInstance
        return_handle: true
      find_by_scriptclass:
        static: true
        return_type: Low::Core::UI::Controller
        return_handle: true
        parameters:
          - name: scriptClass
            type: Low::Core::Scripting::Class
            handle: true
      is_script_controller:
        return_type: bool
        constant: true
        const: true
      update_instances:
        return_type: void
  ControllerInstance:
    no_auto_serialize: true
    no_auto_deserialize: true
    no_auto_duplicate: true
    properties:
      value:
        type: ControllerInstanceValue
      controller:
        type: uint64_t
    functions:
      handle_click:
        return_type: void
        parameters:
          - name: element
            type: Low::Core::UI::Element
            handle: true
  WidgetAsset:
    no_auto_serialize: true
    no_auto_deserialize: true
    no_auto_duplicate: true
    name_editable: true
    post_load: true
    scripting_expose: true
    properties:
      state:
        type: Low::Core::UI::LoadState
        no_ref: true
      content:
        type: Low::Util::List<Low::Core::UI::ElementDescriptor>
        expose_scripting: false
      path:
        type: Low::Util::String
        private_setter: true
      controller:
        type: Low::Core::UI::Controller
        handle: true
        editor_editable: true
      has_custom_controller:
        type: bool
        setter_name: has_custom_controller
        getter_name: has_custom_controller
      local_element_id_counter:
        private_setter: true
        private_getter: true
        type: uint64_t
      custom_controller_id:
        type: uint64_t
    functions:
      get_next_local_id:
        return_type: uint64_t
      parse_content:
        private: true
        return_type: void
        parameters:
          - name: node
            type: Low::Util::Serial::Node
      parse_element:
        private: true
        return_type: void
        parameters:
          - name: node
            type: Low::Util::Serial::Node
          - name: descriptor
            type: Low::Core::UI::ElementDescriptor
      spawn_instance:
        return_type: WidgetInstance
        return_handle: true
        parameters:
          - name: canvas
            type: Low::Renderer::UiCanvas
            handle: true
      spawn_element:
        return_type: Low::Core::UI::Element
        return_handle: true
        parameters:
          - name: instance
            type: Low::Core::UI::WidgetInstance
            handle: true
          - name: canvas
            type: Low::Renderer::UiCanvas
            handle: true
          - name: descriptor
            type: Low::Core::UI::ElementDescriptor
          - name: parent
            type: Low::Core::UI::Element
            handle: true
      fill_element_descriptor:
        return_type: void
        private: true
        parameters:
          - name: element
            type: Low::Core::UI::Element
            handle: true
          - name: descriptor
            type: Low::Core::UI::ElementDescriptor
      fill_content_from_instance:
        return_type: void
        parameters:
          - name: instance
            type: Low::Core::UI::WidgetInstance
            handle: true
      serialize_element_descriptor:
        return_type: void
        private: true
        constant: true
        parameters:
          - name: descriptor
            type: Low::Core::UI::ElementDescriptor
            const: true
          - name: node
            type: Low::Util::Serial::Node

  WidgetInstance:
    no_auto_serialize: true
    no_auto_deserialize: true
    no_auto_duplicate: true
    scripting_expose: true
    properties:
      root:
        type: Low::Core::UI::Element
        handle: true
      elements:
        type: Low::Util::List<Low::Core::UI::Element>
        no_setter: true
      controller_instance:
        type: Low::Core::UI::ControllerInstance
        handle: true

  View:
    unique_id: true
    name_editable: true
    no_auto_duplicate: true
    scripting_expose: true
    header_imports:
      - LowMath.h
    source_imports:
      - LowCoreUiElement.h
      - LowCoreUiDisplay.h
      - LowUtilFileIO.h
      - LowRendererUiCanvas.h
    properties:
      loaded:
        type: bool
        skip_serialization: true
        skip_deserialization: true
      elements:
        type: Util::Set<Util::UniqueId>
        no_setter: true
        skip_serialization: true
        skip_deserialization: true
      internal:
        type: bool
        private_setter: true
        skip_serialization: true
        skip_deserialization: true
      view_template:
        type: bool
        editor_editable: true
      pixel_position:
        type: Low::Math::Vector2
        editor_editable: true
        expose_scripting: true
        getter_name: pixel_position
        setter_name: pixel_position
        dirty_flag: transform_dirty
      rotation:
        type: float
        editor_editable: true
        expose_scripting: true
        getter_name: rotation
        setter_name: rotation
        dirty_flag: transform_dirty
      scale_multiplier:
        type: float
        editor_editable: true
        expose_scripting: true
        getter_name: scale_multiplier
        setter_name: scale_multiplier
        dirty_flag: transform_dirty
      layer_offset:
        type: uint32_t
        editor_editable: true
        expose_scripting: true
        getter_name: layer_offset
        setter_name: layer_offset
        dirty_flag: transform_dirty
      canvas:
        type: Low::Renderer::UiCanvas
        handle: true
        editor_editable: true
    functions:
      serialize_elements:
        return_type: void
        parameters:
          - name: node
            type: Util::Serial::Node
      add_element:
       return_type: void 
       parameters:
         - name: element
           type: Element
           handle: true
      remove_element:
       return_type: void 
       parameters:
         - name: element
           type: Element
           handle: true
      load_elements:
        return_type: void
      unload_elements:
        return_type: void
      spawn_instance:
        return_type: Low::Core::UI::View
        return_handle: true
        expose_scripting: true
        parameters:
          - name: name
            type: Low::Util::Name
      find_element_by_name:
        return_type: Low::Core::UI::Element
        return_handle: true
        expose_scripting: true
        parameters:
          - name: name
            type: Low::Util::Name
      
  Element:
    no_auto_serialize: true
    no_auto_deserialize: true
    no_auto_duplicate: true
    name_editable: true
    scripting_expose: true
    unique_id: true
    private_make: true
    scripting_namespace: UI
    header_imports:
      - LowCoreUiView.h
      - LowRendererUiCanvas.h
    source_imports:
      - LowCoreUiDisplay.h
    properties:
      components:
        type: Util::Map<uint16_t, Util::Handle>
        no_setter: true
      view:
        type: Low::Core::UI::View
        handle: true
        expose_scripting: true
      click_passthrough:
        type: bool
        expose_scripting: true
      canvas:
        type: Low::Renderer::UiCanvas
        handle: true
        private_setter: true
        skip_serialization: true
        skip_deserialization: true
      widget_instance:
        type: uint64_t
      local_id:
        type: uint64_t
    functions:
      make:
        static: true
        return_type: Element
        return_handle: true
        parameters:
          - name: name
            type: Low::Util::Name
          - name: canvas
            type: Low::Renderer::UiCanvas
            handle: true
      get_component:
        expose_scripting: true
        return_type: uint64_t
        constant: true
        parameters:
          - name: typeId
            type: uint16_t
      destroy_with_hierarchy:
        return_type: void
      add_component:
        expose_scripting: true
        return_type: void
        parameters:
          - name: component
            type: Low::Util::Handle
      remove_component:
        expose_scripting: true
        return_type: void
        parameters:
          - name: componentType
            type: uint16_t
      has_component:
        expose_scripting: true
        return_type: bool
        parameters:
          - name: componentType
            type: uint16_t
      get_display:
        expose_scripting: true
        return_type: Low::Core::UI::Component::Display
        return_handle: true
        constant: true
      serialize:
        return_type: void
        constant: true
        parameters:
          - name: node
            type: Util::Serial::Node
          - name: addHandles
            type: bool
      serialize_hierarchy:
        return_type: void
        constant: true
        parameters:
          - name: node
            type: Util::Serial::Node
          - name: addHandles
            type: bool
      deserialize_hierarchy:
        return_type: UI::Element
        return_handle: true
        static: true
        parameters:
          - name: node
            type: Util::Serial::Node
          - name: creator
            type: Util::Handle
            handle: true

