    functions:
      transition_to:
        return_type: void
        parameters:
          - name: newLayout
            type: VkImageLayout
            no_ref: true
      unload:
        return_type: bool
  ViewInfo:
    properties:
      dirty_point_lights:
        type: Util::Set<PointLight>
        no_setter: true
      freed_point_light_slots:
        type: Util::Set<u32>
        no_setter: true
      shadow_pass_data:
        type: ShadowPassViewData
      directional_light_shadow_info:
        type: DirectionalLightShadowInfo
      view_data_buffer:
        type: AllocatedBuffer
        no_ref: true
      directional_light_buffer:
        type: AllocatedBuffer
        no_ref: true
      view_data_descriptor_set:
        type: VkDescriptorSet
        no_ref: true
      lighting_descriptor_set:
        type: VkDescriptorSet
        no_ref: true
      staging_buffers:
        type: Low::Util::List<StagingBuffer>
      initialized:
        type: bool
      gbuffer_descriptor_set:
        type: VkDescriptorSet
        no_ref: true
      point_light_cluster_buffer:
        type: AllocatedBuffer
        no_ref: true
      point_light_buffer:
        type: AllocatedBuffer
        no_ref: true
      light_clusters:
        type: Low::Math::UVector3
      light_cluster_count:
        type: uint32_t
      ui_drawcommand_buffer:
        type: AllocatedBuffer
        no_ref: true
      debug_geometry_buffer:
        type: AllocatedBuffer
        no_ref: true
      object_id_buffer:
        type: AllocatedBuffer
        no_ref: true
    functions:
      get_current_staging_buffer:
        return_type: StagingBuffer
      request_current_staging_buffer_space:
        return_type: size_t
        parameters:
          - name: requestedSize
            type: size_t
            const: true
          - name: outOffset
            type: size_t*
      write_current_staging_buffer:
        return_type: bool
        parameters:
          - name: data
            type: void*
          - name: dataSize
            type: size_t
            const: true
          - name: offset
            type: size_t
            const: true
  Scene:
    properties:
      point_light_slots:
        type: bool*
        private_setter: true
      point_light_buffer:
        type: AllocatedBuffer
      initialized:
        type: bool

  TexExport:
    properties:
      staging_buffer:
        type: AllocatedBuffer
      frame_index:
        type: uint32_t
  BufferHolder:
    properties:
      bf:
        type: AllocatedBuffer
        getter_name: get
        no_ref: true
  SS2DCanvasBackend:
    properties:
      canvas_data:
        type: VkDescriptorSet
        no_ref: true
